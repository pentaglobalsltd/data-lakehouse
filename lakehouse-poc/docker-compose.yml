networks:
  lakehouse:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  superset_home:
  airflow_logs:
  hive_lib:        # JDBC jar downloaded by hive-lib-init, shared into hive-metastore

# Load credentials from .env (copy .env.example → .env and customise)
# All variables fall back to safe defaults so the stack works without .env.

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lakeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakepass}
      POSTGRES_DB: ${POSTGRES_DB:-lakedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=5
        -c max_wal_senders=5
        -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lakeuser} -d ${POSTGRES_DB:-lakedb}"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ─── Zookeeper ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    networks: [lakehouse]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | bash -c 'cat > /dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 15s

  # ─── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms512m"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ─── Kafka Connect (Debezium) ──────────────────────────────────────────────
  # Port removed — external access via nginx on :8091
  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect
    restart: unless-stopped
    networks: [lakehouse]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      HEAP_OPTS: "-Xmx1g -Xms512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123} && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ─── MinIO bucket init ────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks: [lakehouse]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing myminio/lakehouse &&
        echo 'Bucket lakehouse ready'
      "

  # ─── Iceberg REST Catalog ─────────────────────────────────────────────────
  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    container_name: iceberg-rest
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8181:8181"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://lakehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8181'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # ─── Hive Metastore JDBC init ─────────────────────────────────────────────
  # Alpine ships with wget. Downloads the PostgreSQL JDBC jar to a named volume
  # so hive-metastore never needs curl/wget/apt inside the Hive image.
  hive-lib-init:
    image: alpine:3.19
    container_name: hive-lib-init
    networks: [lakehouse]
    volumes:
      - hive_lib:/hive-lib
      - ./hive-metastore/postgresql-42.6.0.jar:/src/postgresql-jdbc.jar:ro
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /hive-lib/postgresql-jdbc.jar ]; then
          echo "[hive-lib-init] JDBC jar already present, skipping copy."
        else
          echo "[hive-lib-init] Copying PostgreSQL JDBC driver from bind-mount..."
          cp /src/postgresql-jdbc.jar /hive-lib/postgresql-jdbc.jar
          echo "[hive-lib-init] Done: $(ls -lh /hive-lib/postgresql-jdbc.jar)"
        fi

  # ─── Hive Metastore ───────────────────────────────────────────────────────
  # Backed by the existing Postgres container (database: metastore).
  # Stores Trino view DDL so silver/gold views survive Trino restarts.
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    restart: unless-stopped
    networks: [lakehouse]
    depends_on:
      postgres:
        condition: service_healthy
      hive-lib-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      IS_RESUME: "true"
      POSTGRES_USER: ${POSTGRES_USER:-lakeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakepass}
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER:-lakeuser}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD:-lakepass}
    volumes:
      - ./hive-metastore/entrypoint.sh:/init/entrypoint.sh:ro
      - ./hive-metastore/metastore-site.xml:/opt/hive/conf/metastore-site.xml:ro
      - ./hive-metastore/postgresql-jdbc.jar:/opt/hive/lib/postgresql-jdbc.jar:ro
    entrypoint: ["/bin/bash", "/init/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9083' 2>/dev/null && echo ok"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ─── Flink JobManager ─────────────────────────────────────────────────────
  # Port removed from host — external access via nginx on :8090
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: flink-jobmanager
    restart: unless-stopped
    networks: [lakehouse]
    command: >
      bash -c "mkdir -p /opt/flink/plugins/s3-fs-hadoop &&
      cp /opt/flink/opt/flink-s3-fs-hadoop-1.18.1.jar /opt/flink/plugins/s3-fs-hadoop/ &&
      /docker-entrypoint.sh jobmanager"
    environment:
      AWS_REGION: us-east-1
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1g
        taskmanager.memory.process.size: 2g
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: s3://lakehouse/flink-checkpoints/
        state.savepoints.dir: s3://lakehouse/flink-savepoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: ${MINIO_ACCESS_KEY:-minioadmin}
        s3.secret-key: ${MINIO_SECRET_KEY:-minioadmin123}
        restart-strategy: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 30s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─── Flink TaskManager ────────────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: flink-taskmanager
    restart: unless-stopped
    networks: [lakehouse]
    command: >
      bash -c "mkdir -p /opt/flink/plugins/s3-fs-hadoop &&
      cp /opt/flink/opt/flink-s3-fs-hadoop-1.18.1.jar /opt/flink/plugins/s3-fs-hadoop/ &&
      /docker-entrypoint.sh taskmanager"
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      AWS_REGION: us-east-1
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2g
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: s3://lakehouse/flink-checkpoints/
        state.savepoints.dir: s3://lakehouse/flink-savepoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: ${MINIO_ACCESS_KEY:-minioadmin}
        s3.secret-key: ${MINIO_SECRET_KEY:-minioadmin123}
        restart-strategy: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 30s

  # ─── Nginx (reverse proxy with basic auth) ────────────────────────────────
  # :8090 → Flink UI + REST API (flink-jobmanager:8081)
  # :8091 → Kafka Connect REST API (kafka-connect:8083)
  # .htpasswd generated by bootstrap.sh from NGINX_USERNAME/NGINX_PASSWORD
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8090:8090"
      - "8091:8091"
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/ 2>&1 | grep -q '401\\|200' && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Trino ────────────────────────────────────────────────────────────────
  # HTTP :8080 — internal use (no auth, for dbt / Airflow / validate.sh)
  # HTTPS :8443 — external admin access with password auth
  trino:
    image: trinodb/trino:438
    container_name: trino
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      iceberg-rest:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    volumes:
      - ./trino/config.properties:/etc/trino/config.properties
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/password-authenticator.properties:/etc/trino/password-authenticator.properties
      # password.db and keystore.jks generated by bootstrap.sh
      - ./trino/password.db:/etc/trino/password.db
      - ./trino/keystore.jks:/etc/trino/keystore.jks
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─── dbt-init (replaces trino-init) ──────────────────────────────────────
  # Runs dbt on every compose up to create/refresh silver + gold HMS-backed views.
  dbt-init:
    image: python:3.11-slim
    container_name: dbt-init
    networks: [lakehouse]
    depends_on:
      trino:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    volumes:
      - ./dbt:/opt/dbt
      - ./scripts/create-views.sh:/opt/create-views.sh:ro
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      DBT_DIR: /opt/dbt
    entrypoint:
      - /bin/bash
      - -c
      - |
        pip install dbt-trino --quiet
        bash /opt/create-views.sh

  # ─── ClickHouse ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickpass123}
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/default-password.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ─── Airflow init (one-shot) ──────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.1
    container_name: airflow-init
    networks: [lakehouse]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakeuser}:${POSTGRES_PASSWORD:-lakepass}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-change-me-generate-with-fernet}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflowpass123}
      POSTGRES_USER: ${POSTGRES_USER:-lakeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakepass}
      POSTGRES_DB: ${POSTGRES_DB:-lakedb}
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install dbt-trino apache-airflow-providers-trino --quiet

        # Create airflow and metastore databases if they don't exist.
        # Uses the source DB (lakedb) as the connection target since it is
        # guaranteed to exist; lakeuser has superuser rights.
        python3 - <<'PYEOF'
        import psycopg2, os, sys
        conn = psycopg2.connect(
            host="postgres",
            user=os.environ["POSTGRES_USER"],
            password=os.environ["POSTGRES_PASSWORD"],
            database=os.environ["POSTGRES_DB"],
        )
        conn.autocommit = True
        cur = conn.cursor()
        for db in ("airflow", "metastore"):
            cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (db,))
            if cur.fetchone():
                print(f"[airflow-init] Database '{db}' already exists.")
            else:
                cur.execute(f"CREATE DATABASE {db}")
                print(f"[airflow-init] Created database '{db}'.")
        cur.close(); conn.close()
        PYEOF

        airflow db migrate
        airflow users create \
          --username admin \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User \
          --email admin@lakehouse.local \
          --role Admin 2>/dev/null || true
        echo "[airflow-init] Airflow init complete."

  # ─── Airflow Webserver ────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: airflow-webserver
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8089:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakeuser}:${POSTGRES_PASSWORD:-lakepass}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-change-me-generate-with-fernet}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_TRINO_DEFAULT: "trino://dbt@trino:8080/"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickpass123}
      TRINO_HOST: trino
      TRINO_PORT: "8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/dbt
      - ./scripts:/opt/scripts:ro
      - airflow_logs:/opt/airflow/logs
    entrypoint:
      - /bin/bash
      - -c
      - |
        pip install dbt-trino apache-airflow-providers-trino --quiet
        exec airflow webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ─── Airflow Scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: airflow-scheduler
    restart: unless-stopped
    networks: [lakehouse]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakeuser}:${POSTGRES_PASSWORD:-lakepass}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-change-me-generate-with-fernet}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_TRINO_DEFAULT: "trino://dbt@trino:8080/"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickpass123}
      TRINO_HOST: trino
      TRINO_PORT: "8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/dbt
      - ./scripts:/opt/scripts:ro
      - airflow_logs:/opt/airflow/logs
    entrypoint:
      - /bin/bash
      - -c
      - |
        pip install dbt-trino apache-airflow-providers-trino --quiet
        exec airflow scheduler

  # ─── Superset ─────────────────────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8088:8088"
    depends_on:
      trino:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "lakehouse-poc-secret-key-change-in-production"
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    entrypoint:
      - /bin/sh
      - -c
      - |
        pip install --quiet trino "clickhouse-connect==0.7.0" &&
        superset db upgrade &&
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@lakehouse.local \
          --password $${ADMIN_PASSWORD} || true &&
        superset init &&
        gunicorn \
          --bind 0.0.0.0:8088 \
          --workers 2 \
          --timeout 120 \
          --limit-request-line 0 \
          --limit-request-field_size 0 \
          'superset.app:create_app()'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
