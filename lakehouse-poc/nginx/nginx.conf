events {
  worker_connections 1024;
}

http {
  # Flink UI + REST API — port 8090 → flink-jobmanager:8081
  server {
    listen 8090;
    server_name _;

    auth_basic "Flink UI";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
      proxy_pass         http://flink-jobmanager:8081;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 300s;
      # Required for multipart JAR uploads
      client_max_body_size 512m;
    }
  }

  # Kafka Connect REST API — port 8091 → kafka-connect:8083
  server {
    listen 8091;
    server_name _;

    auth_basic "Kafka Connect";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
      proxy_pass       http://kafka-connect:8083;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
      client_max_body_size 10m;
    }
  }
}
