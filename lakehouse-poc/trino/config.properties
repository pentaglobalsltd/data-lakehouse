coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# HTTPS with password auth for external access
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/trino-keystore.pem
# Allow internal (non-TLS) requests to proceed without credentials
http-server.authentication.allow-insecure-over-http=true
http-server.authentication.type=PASSWORD
internal-communication.shared-secret=lakehouse-trino-internal-secret-2024

query.max-memory=4GB
query.max-memory-per-node=2GB

node.id=trino-coordinator
node.environment=lakehouse
